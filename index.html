        const keyCoords = [

          { name: 'Siena', lng: 11.3, lat: 43.3, labelOffset: [1, 1], anchor: 'start' },

          { name: 'Noia', lng: -8.89, lat: 42.78, labelOffset: [0, 2.5], anchor: 'middle' },
          { name: 'Fisterra', lng: -9.27, lat: 42.90, type: 'finish', labelOffset: [-1.2, 0.5], anchor: 'end' }
        ];

        const stagePoints = [];
        const dist = (p1, p2) => Math.sqrt(Math.pow(p2.lng - p1.lng, 2) + Math.pow(p2.lat - p1.lat, 2));
        let totalLen = 0;
        for (let i = 0; i < keyCoords.length - 1; i++) totalLen += dist(keyCoords[i], keyCoords[i + 1]);

        const step = totalLen / 98;
        let currentSeg = 0;
        let segmentStartDist = 0;

        for (let i = 0; i < 99; i++) {
          if (i === 98) { stagePoints.push({ lng: keyCoords[keyCoords.length - 1].lng, lat: keyCoords[keyCoords.length - 1].lat }); break; }
          const targetDist = i * step;
          while (currentSeg < keyCoords.length - 1) {
            const d = dist(keyCoords[currentSeg], keyCoords[currentSeg + 1]);
            if (segmentStartDist + d >= targetDist || currentSeg === keyCoords.length - 2) {
              const t = d === 0 ? 0 : (targetDist - segmentStartDist) / d;
              const lng = keyCoords[currentSeg].lng + (keyCoords[currentSeg + 1].lng - keyCoords[currentSeg].lng) * Math.max(0, Math.min(1, t));
              const lat = keyCoords[currentSeg].lat + (keyCoords[currentSeg + 1].lat - keyCoords[currentSeg].lat) * Math.max(0, Math.min(1, t));
              stagePoints.push({ lng, lat });
              break;
            } else { segmentStartDist += d; currentSeg++; }
          }

          const [selectedStage, setSelectedStage] = useState(null);
          const [completedStages, setCompletedStages] = useState({});
          const [activeTab, setActiveTab] = useState('pending');

          const [isAdmin, setIsAdmin] = useState(false);

          const mapRef = React.useRef(null);
          const zoomRef = React.useRef(null);

          const completedCount = Object.keys(completedStages).length;
          const totalStages = 99;
          const progressPercentage = (completedCount / totalStages) * 100;
          const isFinished = completedCount === totalStages;

          const resetApp = () => { setCompletedStages({}); setActiveTab('pending'); setSelectedStage(null); };

          useEffect(() => {
            // Modo Administrador Secreto: ?admin=benxa
            const params = new URLSearchParams(window.location.search);
            if (params.get('admin') === 'benxa') {
              setIsAdmin(true);
            }
            
            // Cargar Mapa Mundial de alta definición
            d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json").then(data => {
              const features = topojson.feature(data, data.objects.countries).features;
              setWorldData(features);
            });
          }, []);

          // --- CONFIGURACIÓN DE ZOOM D3 (Móvil y Desktop) ---
          useEffect(() => {
            if (!mapRef.current) return;
            const svg = d3.select(mapRef.current);
            const g = svg.select("g.map-content");

            const zoom = d3.zoom()
              .scaleExtent([1, 8])
              .on("zoom", (event) => {
                g.attr("transform", event.transform);
              });

            svg.call(zoom);
            zoomRef.current = zoom;
          }, [showMap]);

          const handleZoom = (type) => {
            if (!zoomRef.current || !mapRef.current) return;
            const svg = d3.select(mapRef.current);
            const scaleFactor = type === 'in' ? 1.4 : 0.7;
            svg.transition().duration(300).call(zoomRef.current.scaleBy, scaleFactor);
          };

          // --- SISTEMA DE PROYECCIÓN (ALYRA STYLE) ---
          const { projection, pathFn } = useMemo(() => {
            const w = 1000, h = 500;
            const proj = d3.geoMercator()
              .center([2, 43]) // Centro en Europa para el Camiño
              .scale(1800)
              .translate([w / 2, h / 2.2]);
            return { projection: proj, pathFn: d3.geoPath().projection(proj) };
          }, []);

          useEffect(() => {
            if (!auth) return;
            const initAuth = async () => { try { await signInAnonymously(auth); } catch (e) { } };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user || !db) return;
            const locRef = doc(db, appId, 'benxa_current');
            const unsub = onSnapshot(locRef, (snapshot) => {
              if (snapshot.exists()) {
                const data = snapshot.data();
                // EXPIRACIÓN DE SEÑAL: Solo mostrar si tiene menos de 30 min
                const lastUpdate = new Date(data.timestamp).getTime();
                const now = Date.now();
                if (now - lastUpdate < 30 * 60 * 1000) {
                  setBenxaLocation(data);
                } else {
                  setBenxaLocation(null);
                }
              } else {
                setBenxaLocation(null);
              }
            });
            return () => unsub();
          }, [user]);

          useEffect(() => {
            let watchId;
            if (isEmitting) {
              // FORZAR ACTUALIZACIÓN LOCAL INDEPENDIENTE DE FIREBASE
              watchId = navigator.geolocation.watchPosition((pos) => {
                const newLoc = { 
                  lat: pos.coords.latitude, 
                  lng: pos.coords.longitude, 
                  timestamp: new Date().toISOString() 
                };
                console.log("Nueva ubicación detectada:", newLoc);
                setBenxaLocation(newLoc);
                
                // SUBIR SI FIREBASE ESTÁ LISTO
                if (user && db) {
                  const locRef = doc(db, 'artifacts', appId, 'public', 'data', 'locations', 'benxa_current');
                  setDoc(locRef, newLoc).catch(e => console.error("Error subiendo GPS:", e));
                }
              }, (err) => { 
                console.error("GPS Error:", err);
                setIsEmitting(false);
                let msg = "No se pudo obtener la ubicación.";
                if (err.code === 1) msg = "Permiso denegado. Activa el GPS.";
                else if (err.code === 2) msg = "Ubicación no disponible.";
                else if (err.code === 3) msg = "Tiempo de espera agotado.";
                alert(msg);
              }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
            }
            return () => { if (watchId) navigator.geolocation.clearWatch(watchId); }
          }, [isEmitting, user, db]);

          const currentList = useMemo(() => ALL_STAGES.filter(s => activeTab === 'completed' ? completedStages[s.id] : !completedStages[s.id]), [completedStages, activeTab]);

          return (
            <div className="min-h-screen bg-[#F8F9FA] text-slate-900 font-sans pb-40">

                      <rect width="1000" height="500" fill="#e0f2fe" />
                      <g className="map-content">
                        {/* PAÍSES CON ESTILO ALYRA */}
                        {worldData && worldData.map((feature, i) => (
                          <path 
                            key={i} 
                            d={pathFn(feature)} 
                            fill="#f8fafc" 
                            stroke="#cbd5e1" 
                            strokeWidth="0.5" 
                          />
                        ))}

                        {/* RUTA DEL CAMIÑO */}
                        <path 
                          d={"M " + stagePoints.map(p => projection([p.lng, p.lat]).join(",")).join(" L ")} 
                          fill="none" 
                          stroke="#2563eb" 
                          strokeWidth="2" 
                          strokeDasharray="4 2"
                          opacity="0.8" 
                        />

                        {/* PUNTOS DE ETAPA */}
                        {stagePoints.map((pt, idx) => {
                          const [x, y] = projection([pt.lng, pt.lat]);
                          return <circle key={idx} cx={x} cy={y} r={1.5} fill="#2563eb" opacity="0.4" />;
                        })}

                        {/* LUGARES CLAVE */}
                        {keyCoords.map((pt, idx) => {
                          const [x, y] = projection([pt.lng, pt.lat]);
                          return (
                            <g key={idx}>
                              {pt.type === 'finish' ? (
                                <g transform={`translate(${x}, ${y}) scale(0.6)`}>{MapIcons.finish(0, 0)}</g>
                              ) : (
                                <circle cx={x} cy={y} r={3} fill="#475569" />
                              )}
                              <text 
                                x={x + pt.labelOffset[0] * 6} 
                                y={y + pt.labelOffset[1] * 6} 
                                fontSize="10" 
                                fill="#0f172a" 
                                fontWeight="900" 
                                textAnchor={pt.anchor}
                                style={{ textShadow: '0 1px 2px white' }}
                              >
                                {pt.name}
                              </text>
                            </g>
                          );
                        })}
                        
                        {/* PUNTO DE UBICACIÓN REAL PROFESIONAL */}
                        {benxaLocation && projection([benxaLocation.lng, benxaLocation.lat]) && (() => {
                          const [bx, by] = projection([benxaLocation.lng, benxaLocation.lat]);
                          return (
                            <g transform={`translate(${bx}, ${by})`}>
                              <circle r="15" fill="#ef4444" className="animate-ping" opacity="0.3" />
                              <circle r="5" fill="#ef4444" />
                              <circle r="2" fill="white" className="animate-pulse" />
                            </g>
                          );
                        })()}
                      </g>
                    </svg>
                    <div className="absolute bottom-8 right-6 flex flex-col gap-3">
                      <button onClick={() => handleZoom('in')} className="p-3 bg-white/90 backdrop-blur rounded-xl shadow-lg text-slate-700 hover:bg-white active:scale-95 transition-all"><Radio size={20} className="rotate-45" /></button>
                      <button onClick={() => handleZoom('out')} className="p-3 bg-white/90 backdrop-blur rounded-xl shadow-lg text-slate-700 hover:bg-white active:scale-95 transition-all"><X size={20} /></button>
                    </div>
                  </div>
                </div>
              )}
              <header className="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-slate-200/50 px-6 py-5 shadow-sm">
                <div className="flex justify-between items-center max-w-2xl mx-auto">
                  <div className="flex items-center gap-4">
                    <div className="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center shadow-lg text-amber-400 font-serif font-bold text-2xl">Ñ</div>
                    <h1 className="text-xl font-black tracking-tighter uppercase">CAMIÑO CON BENXA</h1>
                  </div>
                  {isAdmin && (
                    <button onClick={() => setIsEmitting(!isEmitting)} className={`p-3 rounded-full shadow-sm transition-all ${isEmitting ? 'bg-emerald-500 text-white shadow-[0_0_15px_rgba(16,185,129,0.5)] animate-pulse' : 'bg-slate-100 text-slate-400'}`} title={isEmitting ? "Conectado" : "Conectar Dispositivo"}><Radio size={18} /></button>
                  )}
                </div>
              </header>
              <main className="max-w-2xl mx-auto px-4 py-6 space-y-6">
                <div className="flex justify-center"><button onClick={() => { setShowMap(true); setMapZoom(1); setMapPan({x:0, y:0}); }} className="bg-blue-600 text-white px-6 py-3 rounded-full shadow-md flex items-center justify-center gap-2 font-bold uppercase tracking-wider text-sm"><Map size={18} /> ¿Dónde está Benxa?</button></div>
                <div className="flex bg-white p-1.5 rounded-full border border-slate-200 shadow-sm">
                  <button onClick={() => setActiveTab('pending')} className={`flex-1 py-3.5 rounded-full flex items-center justify-center gap-2 text-[10px] font-black uppercase tracking-[0.2em] transition-all ${activeTab === 'pending' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}><ListTodo size={14} /> Pendientes</button>
                  <button onClick={() => setActiveTab('completed')} className={`flex-1 py-3.5 rounded-full flex items-center justify-center gap-2 text-[10px] font-black uppercase tracking-[0.2em] transition-all ${activeTab === 'completed' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}><History size={14} /> Completadas</button>
                </div>
                <div className="grid grid-cols-1 gap-6">
                  {currentList.map(stage => (
                    <div key={stage.id} onClick={() => setSelectedStage(stage)} className="group relative overflow-hidden bg-white rounded-[2.5rem] border border-slate-100 shadow-sm transition-all cursor-pointer active:scale-[0.98]">
                      <div className="relative h-56 w-full overflow-hidden">
                        <img src={stage.img} className="w-full h-full object-cover" loading="lazy" />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/90 to-transparent" />
                        <div className="absolute bottom-5 left-6 right-6 flex justify-between items-end">
                          <div className="text-left">
                            <div className="flex items-center gap-2 mb-2">
                              <span className="bg-white/20 backdrop-blur-md text-white text-[9px] font-black px-3 py-1 rounded-md uppercase tracking-widest border border-white/20">{stage.date}</span>
                              <span className="bg-black/40 backdrop-blur-md text-white text-[9px] font-black px-3 py-1 rounded-md uppercase tracking-widest">{`DÍA ${stage.id}`}</span>
                            </div>
                            <h3 className="text-xl font-black text-white leading-none uppercase italic tracking-tighter">{stage.title}</h3>
                          </div>
                          <button onClick={(e) => { e.stopPropagation(); setCompletedStages(prev => { const ns = {...prev}; if(ns[stage.id]) delete ns[stage.id]; else ns[stage.id]=true; return ns; }); }} className={`p-4 rounded-2xl transition-all shadow-2xl ${completedStages[stage.id] ? "bg-emerald-500 text-white" : "bg-white/10 backdrop-blur-md text-white border border-white/20"}`}><CheckCircle2 size={24} /></button>
                        </div>
                      </div>
                      <div className="p-6 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                          <div className="flex items-center gap-1.5"><Compass size={16} className="text-amber-500" /><span className="text-[10px] font-black text-slate-800 uppercase tracking-widest">{`${stage.km} KM`}</span></div>
                          <div className="flex items-center gap-1.5 border-l border-slate-200 pl-4"><Footprints size={16} className="text-blue-500" /><span className="text-[10px] font-black text-slate-800 uppercase tracking-widest">{`${stage.steps.toLocaleString()} PASOS`}</span></div>
                        </div>
                        <div className="flex items-center gap-1 text-slate-300 font-black text-[9px] uppercase tracking-widest">Ver <ChevronRight size={16} /></div>
                      </div>
                    </div>
                  ))}
                </div>
              </main>
              {selectedStage && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-sm">
                  <div className="bg-white w-full max-w-lg rounded-[3rem] overflow-hidden shadow-2xl flex flex-col animate-in zoom-in-95 duration-300 border border-white/20">
                    <div className="relative h-32 shrink-0"><img src={selectedStage.img} className="w-full h-full object-cover opacity-90" /><button onClick={() => setSelectedStage(null)} className="absolute top-4 right-4 w-10 h-10 bg-black/20 backdrop-blur-xl rounded-full flex items-center justify-center text-white"><X size={18} /></button></div>
                    <div className="p-6 pt-0 space-y-5 flex flex-col">
                      <div className="text-center pt-5">
                        <p className="text-[9px] font-black text-amber-600 uppercase tracking-[0.4em] mb-1">{`ETAPA ${selectedStage.id} • ${selectedStage.date}`}</p>
                        <h2 className="text-3xl font-black text-slate-900 uppercase italic tracking-tighter leading-8">{selectedStage.title}</h2>
                      </div>
                      <div className="w-full space-y-4">
                        <div className="grid grid-cols-2 gap-3">
                          <div className="bg-blue-50/50 p-4 rounded-3xl flex items-center gap-3 border border-blue-100/50"><Footprints size={20} className="text-blue-500" /><div><p className="text-[8px] font-black text-blue-400 uppercase">Esfuerzo</p><p className="text-sm font-black text-blue-900">{`${selectedStage.steps.toLocaleString()} pasos`}</p></div></div>
                          <div className="bg-amber-50/50 p-4 rounded-3xl flex items-center gap-3 border border-amber-100/50"><Compass size={20} className="text-amber-500" /><div><p className="text-[8px] font-black text-amber-400 uppercase">Distancia</p><p className="text-sm font-black text-amber-900">{`${selectedStage.km} KM`}</p></div></div>
                        </div>
                        <button onClick={() => window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(selectedStage.title)}&travelmode=walking`, '_blank')} className="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black text-[11px] tracking-widest flex items-center justify-center gap-3 uppercase shadow-xl hover:bg-slate-800 transition-all"><Navigation size={18} /> Ver en Google Maps</button>
                      </div>
                    </div>
                  </div>
                </div>
              )}
              <footer className="fixed bottom-0 inset-x-0 z-40 p-4 flex justify-center pointer-events-none">
                <div className="max-w-[300px] w-full bg-slate-900/95 backdrop-blur-3xl text-white rounded-[3rem] p-3 shadow-2xl pointer-events-auto border border-white/10 relative overflow-hidden flex items-center gap-4">
                  <div className="absolute top-0 left-0 h-1.5 bg-gradient-to-r from-amber-400 to-amber-600 transition-all duration-1000" style={{ width: `${progressPercentage}%` }} />
                  <PeregrinoAvatar progress={progressPercentage} />
                  <div className="flex-1 pr-4 text-center">
                    <p className="text-[8px] font-black text-white/40 uppercase mb-1">EVOLUCIÓN</p>
                    <div className="flex items-center justify-center gap-3">
                      <span className="text-2xl font-black leading-none tracking-tighter">{completedCount}<span className="text-[10px] text-white/30 font-bold ml-0.5 uppercase tracking-widest"> / 99</span></span>
                      <span className="text-[9px] font-black text-amber-500 bg-amber-500/10 px-2 py-1 rounded-md border border-amber-500/20">{`${Math.round(progressPercentage)}%`}</span>
                    </div>
                  </div>
                </div>
              </footer>
            </div>
          );
        }

        const rootE = document.getElementById('root');
        if (rootE) {
            const root = ReactDOM.createRoot(rootE);
            root.render(<App />);
        }
    </script>
</body>
</html>
